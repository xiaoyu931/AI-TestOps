name: Run Playwright Tests

on:
  push:
    branches: [ main ]

  workflow_dispatch:
    inputs:
      batch_id:
        description: "AI-TestOps batch_id created by platform"
        required: true
        type: string
      dispatcher_plan_id:
        description: "AI-TestOps dispatcher_plan_id"
        required: false
        type: string
        default: "131"
      pytest_nodeid:
        description: "pytest nodeid to run"
        required: false
        type: string
        default: "tests/test_day01_smoke.py::test_open_testops_home"
      browser:
        description: "Playwright browser"
        required: false
        type: string
        default: "chromium"
      test_env:
        description: "Test environment"
        required: false
        type: string
        default: "dev"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: playwright-testops

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Start backend
        run: |
          cd ../backend
          pip install -r requirements.txt || true
          Start-Process -FilePath "python" -ArgumentList "-m uvicorn app.main:app --host 0.0.0.0 --port 8000" -WindowStyle Hidden

      - name: Start frontend
        run: |
          cd ../frontend
          npm install
          Start-Process -FilePath "npm" -ArgumentList "run dev -- --host 0.0.0.0" -WindowStyle Hidden

      - name: Wait for services
        run: |
          Start-Sleep -Seconds 20

      - name: Run tests
        env:
          TEST_ENV: ${{ github.event.inputs.test_env || 'dev' }}
        run: |
          pytest "${{ github.event.inputs.pytest_nodeid || 'tests/test_day01_smoke.py::test_open_testops_home' }}" --browser="${{ github.event.inputs.browser || 'chromium' }}" --testops-batch-id="${{ github.event.inputs.batch_id }}"

      - name: Install Allure
        shell: powershell
        run: |
          if (-not (Get-Command allure -ErrorAction SilentlyContinue)) {
            Write-Host "Allure CLI not found. Please install Allure on the self-hosted runner."
          } else {
            allure --version
          }

      - name: Generate Allure Report
        shell: powershell
        run: |
          if (Get-Command allure -ErrorAction SilentlyContinue) {
            allure generate reports/allure-results -o reports/allure-report --clean
          } else {
            Write-Host "Skip Allure report generation because Allure CLI is not installed."
          }

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: playwright-testops/reports/allure-results
